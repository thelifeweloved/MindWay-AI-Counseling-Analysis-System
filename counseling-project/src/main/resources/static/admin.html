<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>상담사 대시보드</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        tr:hover { background-color: #f9f9f9; cursor: pointer; }
        #detail-view { margin-top: 30px; padding: 20px; border: 2px solid #333; display: none; }
    </style>
</head>
<body>
    <h1>전체 상담 현황</h1>
    <button onclick="loadSessions()">목록 새로고침</button>
    
    <table>
        <thead>
            <tr>
                <th>세션 ID</th>
                <th>클라이언트 ID</th>
                <th>상태</th>
                <th>시작 시간</th>
            </tr>
        </thead>
        <tbody id="session-list"></tbody>
    </table>

    <div id="detail-view">
        <h3>상담 상세 내역</h3>
        <div id="message-content"></div>
    </div>

    <script>
        // 1. 전체 상담 목록 불러오기
        async function loadSessions() {
            const response = await fetch('/api/sessions');
            const sessions = await response.json();
            const listBody = document.getElementById('session-list');
            listBody.innerHTML = '';

            sessions.forEach(s => {
                const row = `<tr onclick="loadMessages('${s.sessionId}')">
                    <td>${s.sessionId}</td>
                    <td>${s.clientId || '익명'}</td>
                    <td>${s.status}</td>
                    <td>${s.startedAt}</td>
                </tr>`;
                listBody.innerHTML += row;
            });
        }

        // 2. 특정 세션의 메시지 불러오기
        async function loadMessages(sessionId) {
            const response = await fetch(`/api/sessions/${sessionId}/messages`);
            const messages = await response.json();
            const detailDiv = document.getElementById('detail-view');
            const contentDiv = document.getElementById('message-content');
            
            detailDiv.style.display = 'block';
            contentDiv.innerHTML = messages.map(m => 
                `<p><strong>[${m.speaker}]</strong>: ${m.text} <small>(${m.seq})</small></p>`
            ).join('');
        }

        window.onload = loadSessions;
    </script>
</body>
</html>
