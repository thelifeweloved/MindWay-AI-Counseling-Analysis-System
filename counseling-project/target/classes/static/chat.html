<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Wellness AI 상담소</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        #chat-container { width: 450px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
        #chat-box { height: 400px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .CLIENT { background: #007bff; color: white; margin-left: auto; text-align: right; }
        .BOT { background: #e9ecef; color: #333; margin-right: auto; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <h3 style="text-align: center;">Wellness AI 상담방</h3>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="고민을 말씀해 주세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    let stompClient = null;
    // 테스트용 랜덤 세션 ID 생성 (가이드 규격)
    const sessionId = "S" + Math.random().toString(36).substr(2, 5).toUpperCase();

    function connect() {
        // 1. WebSocketConfig에서 설정한 엔드포인트(/ws)로 연결
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            
            // 2. 이 세션만의 전용 채널 구독
            stompClient.subscribe('/topic/chat/' + sessionId, function (response) {
                const message = JSON.parse(response.body);
                displayMessage(message);
            });
            
            // 연결 성공 시 안내 메시지
            displayMessage({ speaker: 'BOT', text: '안녕하세요! 당신의 마음을 들려주세요.' });
        });
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (text && stompClient) {
            // 3. 서버의 ChatWsController @MessageMapping("/chat/send")로 전송
            const payload = {
                sessionId: sessionId,
                speaker: 'CLIENT',
                text: text
            };
            stompClient.send("/app/chat/send", {}, JSON.stringify(payload));
            input.value = '';
        }
    }

    function displayMessage(msg) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg ' + msg.speaker;
        div.innerText = msg.text;
        chatBox.appendChild(div);
        
        // 스크롤 최하단 이동
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 페이지 로딩 시 자동으로 연결 시작
    window.onload = connect;
</script>

</body>
</html>
