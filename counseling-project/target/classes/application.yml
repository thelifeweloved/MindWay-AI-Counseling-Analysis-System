server:
  port: 8086

spring:
  application:
    name: counseling-project

  datasource:
    # 도커 DB(counseling)와 연결
    url: jdbc:mysql://localhost:3306/counseling?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 엔티티 수정 시 DB 테이블 자동 업데이트
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # 최신 MySQL 다이얼렉트 설정
        dialect: org.hibernate.dialect.MySQLDialect